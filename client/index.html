<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- ── Primary Meta ───────────────────────── -->
    <title>Expense Tracker — My Money Manager</title>
    <meta name="description" content="Track your cash (coins & notes) and bank accounts easily from one premium dashboard." />
    <meta name="keywords" content="expense tracker, money manager, budget, finance, bank" />

    <!-- ── PWA / Theme ───────────────────────── -->
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="My Money" />
    <meta name="application-name" content="My Money" />

    <link rel="manifest" href="/manifest.json" />

    <!-- ── Icons ─────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" sizes="192x192" href="/icons/icon-192.svg" />
    <link rel="icon" type="image/svg+xml" sizes="512x512" href="/icons/icon-512.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
